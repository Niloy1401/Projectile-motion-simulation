<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Motion Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
/* CORE CONFIGURATION */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --primary: #1e3a8a;
    --accent: #3b82f6;
    --bg-light: #f1f5f9;
    --success: #10b981;
    --card-bg: #ffffff;
}

body {
    background-color: var(--bg-light);
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
}

.main-container {
    width: 100%;
    max-width: 1400px;
    background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    border-radius: 24px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.header {
    border-left: 8px solid var(--accent);
    padding-left: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h1 {
    font-family: 'Poppins', sans-serif;
    color: var(--primary);
    font-size: 32px;
    font-weight: 700;
}

/* VIEWPORT - NOW FULL WIDTH AND LARGER */
.sim-viewport {
    width: 100%;
    height: 650px; /* Increased height significantly */
    background: #fff;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    border: 4px solid var(--primary);
    background-image: 
        linear-gradient(#f1f5f9 1px, transparent 1px),
        linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
    background-size: 40px 40px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
}

.ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: var(--success);
    border-top: 4px solid #065f46;
    z-index: 5;
}

.cartoon-ball {
    position: absolute;
    width: 44px;
    height: 44px;
    background: radial-gradient(circle at 30% 30%, #fb923c, #ea580c);
    border: 3px solid #333;
    border-radius: 50%;
    bottom: 40px;
    left: 40px;
    z-index: 10;
    transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.ball-eye {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    top: 6px;
    right: 8px;
}

.ball-eye::after {
    content: '';
    position: absolute;
    width: 5px;
    height: 5px;
    background: black;
    border-radius: 50%;
    top: 2px;
    left: 2px;
}

.trace-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.4;
    pointer-events: none;
}

/* CONTROLS - REORGANIZED FOR BOTTOM DASHBOARD */
.controls-panel {
    background: var(--card-bg);
    padding: 20px 30px;
    border-radius: 24px;
    border: 2px solid #e2e8f0;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.control-group-container {
    display: flex;
    flex: 1;
    gap: 20px;
    min-width: 600px;
}

.control-group {
    flex: 1;
}

.control-group label {
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--primary);
    font-size: 13px;
}

.control-group span {
    color: var(--accent);
}

input[type=range] {
    width: 100%;
    cursor: pointer;
    accent-color: var(--accent);
}

select {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    font-family: inherit;
    font-size: 14px;
}

.button-group {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 12px 24px;
    border-radius: 12px;
    font-family: 'Poppins';
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    text-transform: uppercase;
}

.btn-launch {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 0 #2563eb;
}

.btn-launch:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #2563eb;
}

.btn-reset {
    background: #64748b;
    color: white;
    box-shadow: 0 4px 0 #475569;
}

.btn-reset:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #475569;
}

/* OVERLAYS */
.data-readout {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(30, 58, 138, 0.9);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-family: 'Courier New', monospace;
    font-size: 16px; /* Slightly larger readout */
    font-weight: bold;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.2);
}

@media (max-width: 1024px) {
    .control-group-container { min-width: 100%; flex-direction: column; }
    .controls-panel { flex-direction: column; align-items: stretch; }
}
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>Interactive Projectile Sandbox</h1>
        <div style="font-size: 14px; color: #64748b; font-weight: 500;">
            <i class="fa-solid fa-expand"></i> Enhanced Display Mode
        </div>
    </div>

    <!-- Huge Viewport Area -->
    <div class="sim-viewport" id="viewport">
        <div class="ground"></div>
        <div class="data-readout" id="dataReadout">
            X: 0.00m | Y: 0.00m<br>
            T: 0.00s
        </div>
        <div class="cartoon-ball" id="ball">
            <div class="ball-eye" id="ballEye"></div>
        </div>
        <div id="trace-container"></div>
    </div>
    
    <!-- Dashboard Controls Area -->
    <div class="controls-panel">
        <div class="control-group-container">
            <div class="control-group">
                <label>Velocity <span><span id="vVal">65</span> m/s</span></label>
                <input type="range" id="vInp" min="10" max="150" value="65">
            </div>
            <div class="control-group">
                <label>Angle <span><span id="aVal">45</span>°</span></label>
                <input type="range" id="aInp" min="0" max="90" value="45">
            </div>
            <div class="control-group">
                <label>Gravity <span><span id="gVal">9.8</span></span></label>
                <select id="gInp">
                    <option value="9.8">Earth (9.8 m/s²)</option>
                    <option value="1.6">Moon (1.6 m/s²)</option>
                    <option value="3.7">Mars (3.7 m/s²)</option>
                    <option value="24.8">Jupiter (24.8 m/s²)</option>
                    <option value="0.5">Micro-G (0.5 m/s²)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Height <span><span id="hVal">0</span>m</span></label>
                <input type="range" id="hInp" min="0" max="400" value="0">
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-launch" onclick="startSim()">Launch!</button>
            <button class="btn btn-reset" onclick="resetSim()">Reset</button>
        </div>
    </div>
</div>

<script>
    const ball = document.getElementById('ball');
    const ballEye = document.getElementById('ballEye');
    const viewport = document.getElementById('viewport');
    const trace = document.getElementById('trace-container');
    const dataDisplay = document.getElementById('dataReadout');

    const vInp = document.getElementById('vInp');
    const aInp = document.getElementById('aInp');
    const gInp = document.getElementById('gInp');
    const hInp = document.getElementById('hInp');

    vInp.oninput = () => document.getElementById('vVal').innerText = vInp.value;
    aInp.oninput = () => document.getElementById('aVal').innerText = aInp.value;
    hInp.oninput = () => {
        document.getElementById('hVal').innerText = hInp.value;
        if (!isFlying) {
            ball.style.bottom = (40 + parseInt(hInp.value) * 1) + 'px';
        }
    };
    gInp.onchange = () => document.getElementById('gVal').innerText = gInp.value;

    let isFlying = false;
    let timer;

    function resetSim() {
        clearInterval(timer);
        isFlying = false;
        trace.innerHTML = '';
        ball.style.left = '40px';
        ball.style.bottom = (40 + parseInt(hInp.value) * 1) + 'px';
        ball.style.transform = 'rotate(0deg) scale(1)';
        ballEye.style.transform = 'scale(1)';
        dataDisplay.innerHTML = `X: 0.00m | Y: 0.00m<br>T: 0.00s`;
    }

    function startSim() {
        if (isFlying) resetSim();
        isFlying = true;

        const v0 = parseFloat(vInp.value);
        const theta = parseFloat(aInp.value) * (Math.PI / 180);
        const g = parseFloat(gInp.value);
        const h0 = parseFloat(hInp.value);

        let t = 0;
        const scale = 1.5; // Adjusted scale for bigger viewport

        timer = setInterval(() => {
            t += 0.04; // Smoother steps
            
            const x = (v0 * Math.cos(theta) * t);
            const y = h0 + (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);

            const dX = 40 + (x * scale);
            const dY = 40 + (y * scale);

            if (dY < 40 || dX > viewport.clientWidth + 100 || dY > viewport.clientHeight + 800) {
                clearInterval(timer);
                isFlying = false;
                
                if (dY < 40) {
                    ball.style.bottom = '40px';
                    ball.style.transform = `rotate(${x * 3}deg) scale(1.3, 0.7)`;
                    setTimeout(() => { ball.style.transform = `rotate(${x * 3}deg) scale(1)`; }, 150);
                }
                ballEye.style.transform = 'scale(1.5)'; 
                return;
            }

            ball.style.left = dX + 'px';
            ball.style.bottom = dY + 'px';
            ball.style.transform = `rotate(${x * 3}deg)`;
            ballEye.style.transform = 'scaleY(0.6) scaleX(1.1)'; 

            dataDisplay.innerHTML = `X: ${x.toFixed(2)}m | Y: ${Math.max(0, y).toFixed(2)}m<br>T: ${t.toFixed(2)}s`;

            if (Math.floor(t * 25) % 2 === 0) {
                const dot = document.createElement('div');
                dot.className = 'trace-dot';
                dot.style.left = (dX + 19) + 'px';
                dot.style.bottom = (dY + 19) + 'px';
                trace.appendChild(dot);
                if (trace.children.length > 200) trace.removeChild(trace.firstChild);
            }
        }, 16); // ~60fps
    }

    resetSim();
</script>

</body>
</html>
